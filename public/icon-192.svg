<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="24" fill="#2a6eff"/>
  <!-- Jenga tower: 3 rows of blocks -->
  <g transform="translate(56, 40)">
    <!-- Row 1 (horizontal) -->
    <rect x="0" y="0" width="80" height="16" rx="2" fill="#deb887"/>
    <rect x="0" y="20" width="80" height="16" rx="2" fill="#b5651d"/>
    <rect x="0" y="40" width="80" height="16" rx="2" fill="#cd853f"/>
    <!-- Row 2 (vertical, rotated 90°) -->
    <rect x="8" y="60" width="16" height="80" rx="2" fill="#a0522d"/>
    <rect x="28" y="60" width="16" height="80" rx="2" fill="#8b4513"/>
    <rect x="48" y="60" width="16" height="80" rx="2" fill="#d2b48c"/>
  </g>
  <text x="96" y="170" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="white">JENGA</text>
</svg>